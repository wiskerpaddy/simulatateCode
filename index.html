<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="manifest" href="./manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>Chord Flick IME</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="icon.png" type="image/png">
</head>
<body>

    <div id="piano-container">
        <div class="piano" id="visual-piano"></div>
    </div> 
    <div id="info-panel">
        <div class="display-main display-box"> 
            <div class="display-label">CHORD</div>            
            <div id="current-chord">READY</div>
        </div>
        
        <div class="display-sub">
            <div class="display-label">INST</div>
            <select id="inst-select" onchange="setInstrument(this.value)">
                <option value="piano">Piano</option>
                <!-- <option value="electricGuitar">Guitar</option> 
                <option value="uprightBass">Bass</option> 
                <option value="synth">Synth</option>      -->
            </select>
            <div class="display-label">OCTAVE</div>
            <select id="octave-select">
                <option value="3">Low</option>
                <option value="4" selected>Mid</option>
                <option value="5">High</option>
            </select>
            <div class="display-label">JAZZ MODE</div>
            <select id="jazz-mode-select">
                <option value="off" selected>OFF</option>
                <option value="on">ON</option>
            </select>
        </div>
    </div>

<div id="demo-controls">
        <button id="btn-autumnLeaves" onclick="toggleDemo('autumnLeaves')">▶ 枯葉 (Demo)</button>
        <button id="btn-flyMe" onclick="toggleDemo('flyMe')">▶ Fly Me (Demo)</button>
        <button id="btn-justTwo" onclick="toggleDemo('justTwo')">▶ Just Two (Demo)</button>
        <button id="btn-youDBeSoNice" onclick="toggleDemo('youDBeSoNice')">▶ You'd Be (Demo)</button>
        <button id="btn-virtualInsanity" onclick="toggleDemo('virtualInsanity')">▶ V. Insanity (Demo)</button>
    </div>
    
    <div class="tempo-container">
        <label for="tempo-slider">TEMPO: <span id="tempo-val">96</span> BPM</label>
        <input type="range" id="tempo-slider" min="60" max="180" value="96" oninput="updateTempo(this.value)">
    </div>

    <div id="ime-keyboard">
        <div class="ime-key" data-root="C">C 
            <span class="flick-guide guide-up-left">M7</span>
            <span class="flick-guide guide-up">m</span>
            <span class="flick-guide guide-right">7</span>
            <span class="flick-guide guide-down">m7</span>
            <span class="flick-guide guide-up-right">7(b9)</span> 
            <span class="flick-guide guide-left">m7(b5)</span>     
            <!-- ▼ 表示を実際の挙動（flat/sharp）に合わせて変更 ▼ -->
            <span class="flick-guide guide-down-left" style="color: #ff6b6b; font-weight: bold;">♭</span>
            <span class="flick-guide guide-down-right" style="color: #ff9f43; font-weight: bold;">＃</span>
        </div>
        <div class="ime-key" data-root="D">D 
            <span class="flick-guide guide-up-left">M7</span>
            <span class="flick-guide guide-up">m</span>
            <span class="flick-guide guide-right">7</span>
            <span class="flick-guide guide-down">m7</span>
            <span class="flick-guide guide-up-right">7(b9)</span> 
            <span class="flick-guide guide-left">m7(b5)</span>     
            <span class="flick-guide guide-down-left" style="color: #ff6b6b; font-weight: bold;">♭</span>
            <span class="flick-guide guide-down-right" style="color: #ff9f43; font-weight: bold;">＃</span>
        </div>
        <div class="ime-key" data-root="E">E 
            <span class="flick-guide guide-up-left">M7</span>
            <span class="flick-guide guide-up">m</span>
            <span class="flick-guide guide-right">7</span>
            <span class="flick-guide guide-down">m7</span>
            <span class="flick-guide guide-up-right">7(b9)</span> 
            <span class="flick-guide guide-left">m7(b5)</span>     
            <span class="flick-guide guide-down-left" style="color: #ff6b6b; font-weight: bold;">♭</span>
            <span class="flick-guide guide-down-right" style="color: #ff9f43; font-weight: bold;">＃</span>
        </div>
        <div class="ime-key" data-root="F">F
            <span class="flick-guide guide-up-left">M7</span>
            <span class="flick-guide guide-up">m</span>
            <span class="flick-guide guide-right">7</span>
            <span class="flick-guide guide-down">m7</span>
            <span class="flick-guide guide-up-right">7(b9)</span> 
            <span class="flick-guide guide-left">m7(b5)</span>     
            <span class="flick-guide guide-down-left" style="color: #ff6b6b; font-weight: bold;">♭</span>
            <span class="flick-guide guide-down-right" style="color: #ff9f43; font-weight: bold;">＃</span>
        </div>
        <div class="ime-key" data-root="G">G 
            <span class="flick-guide guide-up-left">M7</span>
            <span class="flick-guide guide-up">m</span>
            <span class="flick-guide guide-right">7</span>
            <span class="flick-guide guide-down">m7</span>
            <span class="flick-guide guide-up-right">7(b9)</span> 
            <span class="flick-guide guide-left">m7(b5)</span>     
            <span class="flick-guide guide-down-left" style="color: #ff6b6b; font-weight: bold;">♭</span>
            <span class="flick-guide guide-down-right" style="color: #ff9f43; font-weight: bold;">＃</span>
        </div>
        <div class="ime-key" data-root="A">A 
            <span class="flick-guide guide-up-left">M7</span>
            <span class="flick-guide guide-up">m</span>
            <span class="flick-guide guide-right">7</span>
            <span class="flick-guide guide-down">m7</span>
            <span class="flick-guide guide-up-right">7(b9)</span> 
            <span class="flick-guide guide-left">m7(b5)</span>     
            <span class="flick-guide guide-down-left" style="color: #ff6b6b; font-weight: bold;">♭</span>
            <span class="flick-guide guide-down-right" style="color: #ff9f43; font-weight: bold;">＃</span>
        </div>
        <div class="ime-key" data-root="B">B 
            <span class="flick-guide guide-up-left">M7</span>
            <span class="flick-guide guide-up">m</span>
            <span class="flick-guide guide-right">7</span>
            <span class="flick-guide guide-down">m7</span>
            <span class="flick-guide guide-up-right">7(b9)</span> 
            <span class="flick-guide guide-left">m7(b5)</span>     
            <span class="flick-guide guide-down-left" style="color: #ff6b6b; font-weight: bold;">♭</span>
            <span class="flick-guide guide-down-right" style="color: #ff9f43; font-weight: bold;">＃</span>
        </div>
        <div class="ime-key" data-root="C5">C↑
            <span class="flick-guide guide-up-left">M7</span>
            <span class="flick-guide guide-up">m</span>
            <span class="flick-guide guide-right">7</span>
            <span class="flick-guide guide-down">m7</span>
            <span class="flick-guide guide-up-right">7(b9)</span> 
            <span class="flick-guide guide-left">m7(b5)</span>     
            <span class="flick-guide guide-down-left" style="color: #ff6b6b; font-weight: bold;">♭</span>
            <span class="flick-guide guide-down-right" style="color: #ff9f43; font-weight: bold;">＃</span>
        </div>
        <div class="ime-key" data-root="D5">D↑
            <span class="flick-guide guide-up-left">M7</span>
            <span class="flick-guide guide-up">m</span>
            <span class="flick-guide guide-right">7</span>
            <span class="flick-guide guide-down">m7</span>
            <span class="flick-guide guide-up-right">7(b9)</span> 
            <span class="flick-guide guide-left">m7(b5)</span>     
            <span class="flick-guide guide-down-left" style="color: #ff6b6b; font-weight: bold;">♭</span>
            <span class="flick-guide guide-down-right" style="color: #ff9f43; font-weight: bold;">＃</span>
        </div>
    </div>
    
    <script src="./script.js"></script>
</body>
</html>

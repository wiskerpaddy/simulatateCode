<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="manifest" href="./manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>Chord Flick IME</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="piano-container">
        <div class="piano" id="visual-piano">
            <div class="white-key" data-note="C4"></div>
            <div class="black-key" style="left: 14.28%" data-note="C#4"></div>
            <div class="white-key" data-note="D4"></div>
            <div class="black-key" style="left: 28.56%" data-note="D#4"></div>
            <div class="white-key" data-note="E4"></div>
            <div class="white-key" data-note="F4"></div>
            <div class="black-key" style="left: 57.12%" data-note="F#4"></div>
            <div class="white-key" data-note="G4"></div>
            <div class="black-key" style="left: 71.4%" data-note="G#4"></div>
            <div class="white-key" data-note="A4"></div>
            <div class="black-key" style="left: 85.68%" data-note="A#4"></div>
            <div class="white-key" data-note="B4"></div>
            <div class="white-key" data-note="C5"></div>
        </div>
    </div>

    <div id="info-panel">
        <div id="current-chord">READY</div>
    </div>

    <div id="ime-keyboard">
        <div class="ime-key" data-root="C">C <span class="flick-guide guide-up">m</span><span class="flick-guide guide-right">7</span><span class="flick-guide guide-down">m7</span></div>
        <div class="ime-key" data-root="D">D <span class="flick-guide guide-up">m</span><span class="flick-guide guide-right">7</span><span class="flick-guide guide-down">m7</span></div>
        <div class="ime-key" data-root="E">E <span class="flick-guide guide-up">m</span><span class="flick-guide guide-right">7</span><span class="flick-guide guide-down">m7</span></div>
        <div class="ime-key" data-root="F">F <span class="flick-guide guide-up">m</span><span class="flick-guide guide-right">7</span><span class="flick-guide guide-down">m7</span></div>
        <div class="ime-key" data-root="G">G <span class="flick-guide guide-up">m</span><span class="flick-guide guide-right">7</span><span class="flick-guide guide-down">m7</span></div>
        <div class="ime-key" data-root="A">A <span class="flick-guide guide-up">m</span><span class="flick-guide guide-right">7</span><span class="flick-guide guide-down">m7</span></div>
        <div class="ime-key" data-root="B">B <span class="flick-guide guide-up">m</span><span class="flick-guide guide-right">7</span><span class="flick-guide guide-down">m7</span></div>
        <div class="ime-key" data-root="C5">高C</div>
        <div class="ime-key" data-root="D5">高D</div>
    </div>
    
    <script src="./script.js"></script>
    <style>

    </style>
</body>
</html>
